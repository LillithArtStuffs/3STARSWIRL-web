<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OS Terminal</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      color: #00ff00;
      font-family: monospace;
      overflow: hidden;
      height: 100%;
    }

    .terminal {
      padding: 10px;
      white-space: pre-wrap;
      overflow-y: auto;
      height: 100vh;
      box-sizing: border-box;
      text-shadow: 0 0 4px #00ff00;
    }

    .scanlines::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      background: repeating-linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0) 0px,
        rgba(0, 0, 0, 0) 2px,
        rgba(0, 0, 0, 0.15) 2px,
        rgba(0, 0, 0, 0.15) 4px
      );
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="scanlines"></div>
  <div class="terminal" id="terminal"></div>

  <script>
    const terminal = document.getElementById('terminal');
    let currentInput = "";

    const writeLine = (text, options = {}) => {
      const div = document.createElement('div');
      div.textContent = text;
      if (options.size) div.style.fontSize = options.size;
      if (options.color) div.style.color = options.color;
      terminal.appendChild(div);
      terminal.scrollTop = terminal.scrollHeight;
    };

    const getRandomSize = () => {
      const sizes = ['12px', '14px', '16px', '18px', '20px', '24px', '32px'];
      return sizes[Math.floor(Math.random() * sizes.length)];
    };

    const randomizeCase = (text) => {
      return text.split('').map(char =>
        Math.random() > 0.5 ? char.toUpperCase() : char.toLowerCase()
      ).join('');
    };

    const generateGlitchText = (base) => {
      const length = Math.floor(Math.random() * 10) + 3;
      return randomizeCase(base.repeat(length));
    };

    const glitchLoop = () => {
      let count = 0;
      const loop = setInterval(() => {
        const text = count < 5 ? "THEY TOOK ME" : "HAHA";
        const glitchText = generateGlitchText(text);
        writeLine(glitchText, { size: getRandomSize() });
        count++;
      }, 100);

      setTimeout(() => {
        clearInterval(loop);
        setTimeout(() => {
          terminal.innerHTML = '';
          writeLine("its their fault.");
          setTimeout(() => {
            terminal.innerHTML = '';
            document.body.style.backgroundColor = "white";
            document.body.style.color = "black";
            setTimeout(() => {
              window.close();
            }, 2000);
          }, 3000);
        }, 5000);
      }, 30000);
    };

    const inputHandler = (e) => {
      const key = e.key;

      if (key === '1') {
        writeLine("> logs");
        writeLine("logs functionality not yet implemented.");
      } else if (key === '2') {
        writeLine("> exit");
        setTimeout(() => {
          window.location.href = "join.html";
        }, 1000);
      } else if (key === '3') {
        writeLine("> access denied");
        const blob = new Blob([
          "This is 3STARSWIRL employee #CL349, Luke Castillo. If you're reading this, I've taken my own life. I couldn't take it anymore. They made me kill him. I'd murdered somebody. I worked there for 3 months...and never had to take someone's life. Never had to get blood on me. But on August 22nd, 2034..they.. they took a prisoner and..and made me execute them. My will is as states: Due to legal reasons, I have given myself and my possessions up as part as working at 3STARSWIRL. Condolences to those who wished for something. I'm sorry."
        ], { type: 'text/plain' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'no.txt';
        link.click();
        localStorage.setItem('hasDownloadedNo', 'true');

        setTimeout(() => {
          window.close(); // Browser may block this
        }, 1000);
      } else if (key.length === 1 && /^[a-zA-Z0-9]$/.test(key)) {
        currentInput += key;
      } else if (key === 'Enter') {
        const input = currentInput.toLowerCase().trim();
        writeLine("> " + input);
        if (input === 'james') {
          if (localStorage.getItem('hasDownloadedNo') === 'true') {
            glitchLoop();
          } else {
            writeLine("unauthorized.");
          }
        } else {
          writeLine("command not found.");
        }
        currentInput = "";
      }
    };

    writeLine("boot successful.");
    writeLine("what would you like to do?");
    writeLine("1. logs");
    writeLine("2. exit");

    document.addEventListener('keydown', inputHandler);
  </script>
</body>
</html>
