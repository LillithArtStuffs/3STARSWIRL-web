<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>3STARSWIRL — Down for 0.3</title>

  <meta property="og:title" content="3STARSWIRL — Down for 0.3">
  <meta property="og:description" content="Version 0.3 is in the works. Be patient.">
  <meta property="og:type" content="website">

  <meta name="description" content="Version 0.3 is in the works. Be patient.">
  <meta name="theme-color" content="#ffffff">
</head>

<body style="background:white;color:black;font-family:sans-serif;">
  <div id="text"></div>

  <script>
    const text = document.getElementById("text");

    const messages = [
      { text: "down for maintenance", delay: 0 },
      { text: "be patient", delay: 1500 },
      { text: "version 0.3 in the works", delay: 3000 },

      { text: "why are you still here?", delay: 13000 },
      { text: "updates take time, now go enjoy yours", delay: 14500 }
    ];

    messages.forEach(msg => {
      setTimeout(() => {
        text.innerHTML += `<p>${msg.text}</p>`;
      }, msg.delay);
    });

    setTimeout(() => {
      window.close();

      setTimeout(() => {
        if (!window.closed) {
          location.replace("about:blank");
        }
      }, 500);
    }, 17000);
  </script>
</body>
</html>
