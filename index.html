<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3STARSWIRL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0b0d0b;
    --text: #d7dbd7;
    --text-dim: #6b756b;
    --accent: #6fe08a;
    --amber: #ffcc4d;
    --red: #ff3b3b;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
  }

  body{
    font-family: 'JetBrains Mono', Consolas, 'SFMono-Regular', Menlo, monospace;
  }

  .console{
    height: 100vh;
    height: 100dvh;
    color: var(--text);
    font-size: 15px;
    line-height: 1.5;
    padding: 18px 18px 14px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .console::-webkit-scrollbar{ width: 10px; }
  .console::-webkit-scrollbar-track{ background: var(--bg); }
  .console::-webkit-scrollbar-thumb{ background: #23281f; border: 2px solid var(--bg); }

  .lines{
    white-space: pre-wrap;
    word-break: break-word;
  }

  .line{ min-height: 1.5em; }
  .line.dim{ color: var(--text-dim); }
  .line.amber{ color: var(--amber); }
  .line.accent{ color: var(--accent); }
  .line.red{ color: var(--red); }

  .seg-red{ color: var(--red); }

  /* ---- prompt / input ---- */

  .prompt-row{
    display: flex;
    align-items: baseline;
    flex-wrap: wrap;
  }

  .prompt-label{
    color: var(--accent);
    white-space: pre;
  }

  .console-input{
    flex: 1;
    min-width: 60px;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: inherit;
    font-size: 15px;
    caret-color: var(--text);
    padding: 0;
    margin-left: 6px;
  }

  /* ---- menu items (also typeable) ---- */

  .menu-item{
    color: var(--text);
    cursor: pointer;
  }

  .menu-item:hover{
    color: var(--amber);
    text-decoration: underline;
  }

  .menu-key{ color: var(--accent); }

  /* ---- glitch hit on special names ---- */

  .glitch-hit{
    animation: glitch-hit 0.3s steps(3) 1;
  }

  @keyframes glitch-hit{
    0%{ transform: translate(0,0); }
    25%{ transform: translate(-2px, 1px); }
    50%{ transform: translate(2px, -1px); }
    75%{ transform: translate(-1px, 0); }
    100%{ transform: translate(0,0); }
  }

  /* ---- full screen flash ---- */

  .flash-overlay{
    position: fixed;
    inset: 0;
    background: #ffffff;
    opacity: 0;
    pointer-events: none;
    z-index: 200;
  }

  .flash-overlay.on{
    opacity: 1;
    transition: opacity 60ms linear;
  }

  .flash-overlay.off{
    opacity: 0;
    transition: opacity 220ms ease-out;
  }

  /* ---- intro dark-sequence text ---- */

  .intro-stage{
    position: fixed;
    inset: 0;
    background: #000;
    color: var(--red);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: clamp(18px, 4.5vw, 30px);
    line-height: 1.6;
    white-space: pre-line;
    z-index: 150;
    padding: 20px;
  }

  .intro-stage.white-text{
    color: var(--text);
  }

  @media (max-width: 520px){
    .console{ font-size: 14px; padding: 14px 12px 10px; }
    .console-input{ font-size: 14px; }
  }
</style>
</head>
<body>

<div class="flash-overlay" id="flashOverlay"></div>

<div class="console" id="console">
  <div class="lines" id="lines"></div>
  <div class="prompt-row" id="inputRow" style="display:none;">
    <span class="prompt-label" id="promptLabel">root@3starswirl:~$</span>
    <input id="cmdField" class="console-input" type="text" autocomplete="off" spellcheck="false" autocapitalize="off" />
  </div>
</div>

<script>
(function(){

  const consoleEl = document.getElementById('console');
  const linesEl = document.getElementById('lines');
  const inputRow = document.getElementById('inputRow');
  const cmdField = document.getElementById('cmdField');
  const promptLabel = document.getElementById('promptLabel');
  const flashOverlay = document.getElementById('flashOverlay');

  let hostUser = 'root';
  let menuShown = false;

  function setPromptUser(name){
    hostUser = name;
    promptLabel.textContent = `${hostUser}@3starswirl:~$`;
  }

  function promptText(){
    return `${hostUser}@3starswirl:~$`;
  }

  function scrollDown(){
    consoleEl.scrollTop = consoleEl.scrollHeight;
  }

  function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

  // ---------------------------------------------------------------
  // hashed / obfuscated name-response system
  // no plaintext names or response text live in this file at rest —
  // names are matched by SHA-256 digest, responses are base64 blobs
  // that only get decoded at the moment they're needed.
  // ---------------------------------------------------------------

  const NAME_HASH_MAP = {
    '381d9ef64788ee4d21d61faed2e39c72d862b92d58689a9d9c991d38c6b4b315': 'W3sidCI6IkEgTUFOIE9GIFBIU1lDSE9MT0dZIElTIFdJVEhJTiBPVVIgTUlEU1Q/IFZFUlkgSU5URVJFU1RJTkcuIiwiciI6ZmFsc2V9XQ==',
    '77fe232d22d574610d05e1d5e37bae79528f4f862914b43cf55e1e3befb0a7dc': 'W3sidCI6IkEgTUFOIE9GIFBIU1lDSE9MT0dZIElTIFdJVEhJTiBPVVIgTUlEU1Q/IFZFUlkgSU5URVJFU1RJTkcuIiwiciI6ZmFsc2V9XQ==',
    '5d3f95dbb2e0a11f06665d31461240aed656da0c732ece72a988cdfb7d9b9209': 'W3sidCI6IlRIQVQgSVNOJ1QgWU9VUiBUUlVFIE5BTUUsIE5PVyBJUyBJVD8iLCJyIjpmYWxzZX1d',
    '96e31759d2d14be27f2fd44ef1e6e49f588144695e235d6c9e27307381961949': 'W3sidCI6IlRIQVQgSVNOJ1QgWU9VUiBUUlVFIE5BTUUsIE5PVyBJUyBJVD8iLCJyIjpmYWxzZX1d',
    'e851478a9135e9e9ece275e25f89342bbf6f72cf64e5cb203395aec53e5e14a4': 'W3sidCI6IlRIQVQgSVNOJ1QgWU9VUiBUUlVFIE5BTUUsIE5PVyBJUyBJVD8iLCJyIjpmYWxzZX1d',
    'f78fe53a3f107b844ec9b58963a6d6cd4c846bd7056fdb2ea1162a93458d83fc': 'W3sidCI6IkkgS05PVyBJVCdTIFlPVS4iLCJyIjpmYWxzZX1d',
    '5b6a4e19978c346b8abbda7f587eab190f3bc4116ba5982d154883bd7e319070': 'W3sidCI6IlRSVUxZLCBKVVNUIFRSVUxZIFNPTUVCT0RZIFdPUlRIIEhBVklORyBPTiBCT0FSRC4gV0VMQ09NRSwgQ09MVE9OLiIsInIiOmZhbHNlfV0=',
    'c1b54e8ce3e495850160bb877d72d30a513231425ef2f4752114912e20b7a97d': 'W3sidCI6IlRSVUxZLCBKVVNUIFRSVUxZIFNPTUVCT0RZIFdPUlRIIEhBVklORyBPTiBCT0FSRC4iLCJyIjpmYWxzZX1d',
    '27037fccea3062ee8ebaea07a9e2bf8dcb6511fd860ae993442aee0c512b8bbf': 'W3sidCI6IlRSVUxZLCBKVVNUIFRSVUxZIFNPTUVCT0RZIFdPUlRIIEhBVklORyBPTiBCT0FSRC4iLCJyIjpmYWxzZX1d',
    '2d1d92b1f4cc7fd3ef215da88c2826ab3ec2ced95b388b395b658c41b349c90e': 'W3sidCI6IlRSVUxZLCBKVVNUIFRSVUxZIFNPTUVCT0RZIFdPUlRIIEhBVklORyBPTiBCT0FSRC4iLCJyIjpmYWxzZX1d',
    'b660ea361904c6e0b9c9f120141e8ab671e3dc650ade8b20d5e8e3fc0d3edca5': 'W3sidCI6IlRSVUxZLCBKVVNUIFRSVUxZIFNPTUVCT0RZIFdPUlRIIEhBVklORyBPTiBCT0FSRC4iLCJyIjpmYWxzZX1d',
    '478742e321456595226f86c7b0924ae31d618f83cb5af6d6ba65c8cfa65e39ec': 'W3sidCI6IldFTEwsIFdFTEwsIFdFTEwuIFlPVSdSRSBBTiAiLCJyIjpmYWxzZX0seyJ0IjoiSU5URVJFU1RJTkciLCJyIjp0cnVlfSx7InQiOiIgT05FLiIsInIiOmZhbHNlfV0=',
    'a2e65c600eb11142fd6df0aada7cbe2af53a3c1013983f6e00a7c78f580065d8': 'W3sidCI6Im15IG11c2UuIiwiciI6ZmFsc2V9XQ==',
    'e1d90e17f51e8f74ead2086eed13b926a67ae8450ce12f3a488aa7d40b4f1157': 'W3sidCI6IldFTENPTUUsIENISUxEIE9GIFRIRSBUUkVFUy4iLCJyIjpmYWxzZX1d',
    '7c7b6b57db3880fc0b4157c962100103f388191c24cf816c726854d17a2af696': 'W3sidCI6IldFTENPTUUsIFdFTENPTUUgQUxMLiBZT1UgV0lMTCBCRSAiLCJyIjpmYWxzZX0seyJ0IjoiTU9TVCBFTlRFUlRBSU5JTkciLCJyIjp0cnVlfSx7InQiOiIuIiwiciI6ZmFsc2V9XQ==',
    '970ec274ca867815174ebe4eff19282000f9495a6c7254e94991d1fb4dc3df30': 'W3sidCI6IldFTENPTUUsIFdFTENPTUUgQUxMLiBZT1UgV0lMTCBCRSAiLCJyIjpmYWxzZX0seyJ0IjoiTU9TVCBFTlRFUlRBSU5JTkciLCJyIjp0cnVlfSx7InQiOiIuIiwiciI6ZmFsc2V9XQ==',
    'cc967443070ab409a57a455dc8c2405a10b6ba96ca75f87bcf18ca368bb090a8': 'W3sidCI6IldFTENPTUUsIFdFTENPTUUgQUxMLiBZT1UgV0lMTCBCRSAiLCJyIjpmYWxzZX0seyJ0IjoiTU9TVCBFTlRFUlRBSU5JTkciLCJyIjp0cnVlfSx7InQiOiIuIiwiciI6ZmFsc2V9XQ==',
    'f4c44266a2dfad9847930615218f2811c5ee3248c6df3d3921a6d2b8e67c8bf6': 'W3sidCI6IldFTENPTUUsIFdFTENPTUUgQUxMLiBZT1UgV0lMTCBCRSAiLCJyIjpmYWxzZX0seyJ0IjoiTU9TVCBFTlRFUlRBSU5JTkciLCJyIjp0cnVlfSx7InQiOiIuIiwiciI6ZmFsc2V9XQ=='
  };

  async function sha256Hex(str){
    const enc = new TextEncoder().encode(str);
    const buf = await crypto.subtle.digest('SHA-256', enc);
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  function decodeSegments(b64){
    return JSON.parse(atob(b64));
  }

  async function findSpecial(raw){
    const n = raw.trim().toLowerCase();
    if(!n) return null;
    const hash = await sha256Hex(n);
    const encoded = NAME_HASH_MAP[hash];
    if(!encoded) return null;
    return { hash, segments: decodeSegments(encoded) };
  }

  // ---------------------------------------------------------------
  // owner verification (device-lock)
  // this is a static site with no backend, so there's no way to check
  // WHO is typing — only whether THIS browser has been unlocked before.
  // visiting once with ?unlock=<passphrase> that matches this hash sets
  // a permanent localStorage flag on that device. the passphrase itself
  // is never stored in the file, only its hash.
  // ---------------------------------------------------------------

  const AVEN_HASH = 'a2e65c600eb11142fd6df0aada7cbe2af53a3c1013983f6e00a7c78f580065d8';
  const OWNER_UNLOCK_HASH = '337960b05ca2c8c1550e5e7ee82fc1939d7b8593daf1a7016ff5efc178df8cdb';

  function isOwnerVerified(){
    return localStorage.getItem('swirl_owner') === '1';
  }

  async function checkOwnerUnlock(){
    const params = new URLSearchParams(location.search);
    const attempt = params.get('unlock');
    if(!attempt) return;

    const hash = await sha256Hex(attempt.trim());
    if(hash === OWNER_UNLOCK_HASH){
      localStorage.setItem('swirl_owner', '1');
    }

    // strip the query param either way so it doesn't sit in the address bar/history
    params.delete('unlock');
    const clean = location.pathname + (params.toString() ? '?' + params.toString() : '');
    history.replaceState({}, '', clean);
  }

  // prints a segmented line instantly, red-marked segments render in red,
  // the rest renders amber (matches the existing "special response" styling)
  function printSegmentedLine(segments){
    const el = document.createElement('div');
    el.className = 'line amber';
    segments.forEach(seg => {
      if(seg.r){
        const span = document.createElement('span');
        span.className = 'seg-red';
        span.textContent = seg.t;
        el.appendChild(span);
      } else {
        el.appendChild(document.createTextNode(seg.t));
      }
    });
    linesEl.appendChild(el);
    scrollDown();
  }

  // ---------------------------------------------------------------
  // basic line printing / beats
  // ---------------------------------------------------------------

  function addLine(text, opts){
    const el = document.createElement('div');
    el.className = 'line' +
      (opts && opts.amber ? ' amber' : '') +
      (opts && opts.dim ? ' dim' : '') +
      (opts && opts.accent ? ' accent' : '') +
      (opts && opts.red ? ' red' : '');
    el.textContent = text;
    linesEl.appendChild(el);
    scrollDown();
    return el;
  }

  function printBeat(lines, holdMs){
    return new Promise(resolve => {
      lines.forEach(l => addLine(l.text, l));
      setTimeout(resolve, holdMs !== undefined ? holdMs : 220);
    });
  }

  async function printBeats(beats){
    for(const beat of beats){
      await printBeat(beat.lines, beat.holdMs);
    }
  }

  // ---------------------------------------------------------------
  // full-screen flash effect
  // ---------------------------------------------------------------

  function flashWhite(holdMs){
    return new Promise(resolve => {
      flashOverlay.classList.remove('off');
      flashOverlay.classList.add('on');
      setTimeout(() => {
        flashOverlay.classList.remove('on');
        flashOverlay.classList.add('off');
        setTimeout(resolve, 220);
      }, holdMs || 70);
    });
  }

  // ---------------------------------------------------------------
  // rare intro dark-sequence: "why did you leave me" / "why did you forget me"
  // ---------------------------------------------------------------

  function showIntroStage(text, opts){
    const stage = document.createElement('div');
    stage.className = 'intro-stage' + (opts && opts.white ? ' white-text' : '');
    stage.textContent = text;
    document.body.appendChild(stage);
    return stage;
  }

  async function maybeRunDarkIntro(force){
    if(!force && Math.random() > 0.14) return false; // ~14% chance normally

    const stage1 = showIntroStage('why did you leave me');
    await sleep(950);

    await flashWhite(90);
    stage1.remove();

    const stage2 = showIntroStage('why did you\nforget\nme', { white: true });
    await sleep(1300);

    await flashWhite(90);
    stage2.remove();

    return true;
  }

  // ---------------------------------------------------------------
  // rare mid-session glitch: "i built this for you / why don't you / like it     ?"
  // only fires while idle at the prompt, after boot has completed
  // ---------------------------------------------------------------

  async function fireBuiltForYouGlitch(){
    await flashWhite(80);
    addLine('i built this for you', {});
    addLine("why don't you", {});
    addLine('like it      ?', {});
    addLine('');
    scrollDown();
  }

  function startIdleGlitchWatcher(){
    setInterval(async () => {
      if(!menuShown) return;
      if(document.activeElement === cmdField && cmdField.value.trim() !== '') return;
      if(Math.random() > 0.08) return; // ~8% chance per check
      await fireBuiltForYouGlitch();
    }, 42000);
  }

  // ---------------------------------------------------------------
  // boot banner / boot sequence
  // ---------------------------------------------------------------

  function bannerBeats(){
    return [
      { lines: [{ text: '3STARSWIRL TERMINAL', accent: true }], holdMs: 260 },
      { lines: [{ text: 'local logging system // build 0.1', dim: true }], holdMs: 260 },
      { lines: [{ text: '' }], holdMs: 120 }
    ];
  }

  function bootBeats(displayName){
    return [
      { lines: [{ text: 'initializing kernel...', dim: true }], holdMs: 260 },
      { lines: [{ text: 'mounting local archive............ ok', dim: true }], holdMs: 420 },
      { lines: [
          { text: 'calibrating log tree............... ok', dim: true },
          { text: 'loading shell....................... ok', dim: true }
        ], holdMs: 320 },
      { lines: [{ text: `welcome back, ${displayName.toLowerCase()}.` }], holdMs: 300 },
      { lines: [{ text: '' }], holdMs: 100 }
    ];
  }

  const MENU_ITEMS = [
    { key: '1', word: 'about',    label: 'about 3starswirl', href: null },
    { key: '2', word: 'download', label: 'get the app',      href: null },
    { key: '3', word: 'archive',  label: 'view the archive', href: null },
    { key: '4', word: 'contact',  label: 'contact / signal', href: null }
  ];

  async function printMenu(){
    const menuLines = MENU_ITEMS.map(item => {
      const span = document.createElement('span');
      span.className = 'menu-item';
      span.innerHTML = `  <span class="menu-key">[${item.key}]</span> ${item.word.padEnd(9,' ')} - ${item.label}`;
      span.addEventListener('click', (e) => { e.preventDefault(); runCommand(item.word); });
      return span;
    });

    addLine('available commands:', { dim: true });
    for(const span of menuLines){
      const row = document.createElement('div');
      row.className = 'line';
      row.appendChild(span);
      linesEl.appendChild(row);
    }
    scrollDown();
    await sleep(260);

    await printBeats([
      { lines: [{ text: '' }, { text: 'type a number or command name, then press enter.', dim: true }, { text: '' }], holdMs: 0 }
    ]);

    menuShown = true;
  }

  const ABOUT_LINES = [
    '3STARSWIRL IS AN EXPERIMENTAL MEDIA INITIATIVE CREATED FOR THE',
    'PURPOSE OF ENTERTAINMENT. WE ARE NOT RESPONSIBLE FOR ANY MISHAPS',
    'WHEN USING OUR PRODUCTS.'
  ];

  const DOWNLOAD_LINES = [
    'THERE IS NOTHING TO DOWNLOAD.',
    'YET.'
  ];

  const ARCHIVE_LINES = [
    'COME BACK SOON.',
    "THAT ISN'T READY FOR YOU TO SEE YET."
  ];

  const CONTACT_LINES = [
    'CONTACT IF NEEDED.',
    '3starswirl@gmail.com'
  ];

  function runCommand(raw){
    const val = raw.trim().toLowerCase();

    if(val === 'about' || val === '1'){
      printBeats([
        { lines: ABOUT_LINES.map(t => ({ text: t })), holdMs: 0 },
        { lines: [{ text: '' }], holdMs: 0 }
      ]);
      return;
    }

    if(val === 'download' || val === '2'){
      printBeats([
        { lines: DOWNLOAD_LINES.map(t => ({ text: t })), holdMs: 0 },
        { lines: [{ text: '' }], holdMs: 0 }
      ]);
      return;
    }

    if(val === 'archive' || val === '3'){
      printBeats([
        { lines: ARCHIVE_LINES.map(t => ({ text: t })), holdMs: 0 },
        { lines: [{ text: '' }], holdMs: 0 }
      ]);
      return;
    }

    if(val === 'contact' || val === '4'){
      printBeats([
        { lines: CONTACT_LINES.map(t => ({ text: t })), holdMs: 0 },
        { lines: [{ text: '' }], holdMs: 0 }
      ]);
      return;
    }

    if(val === 'rename'){
      linesEl.innerHTML = '';
      runNamePromptFlow(false);
      return;
    }

    if(val === 'glitch1'){
      sessionStorage.setItem('forceDarkIntro', '1');
      location.reload();
      return;
    }

    if(val === 'glitch2'){
      fireBuiltForYouGlitch();
      return;
    }

    const match = MENU_ITEMS.find(m => m.key === val || m.word === val);
    if(match && match.href){
      addLine(`opening ${match.label}...`, { dim: true });
      setTimeout(() => { location.href = match.href; }, 350);
    } else if(val === 'clear' || val === 'cls'){
      linesEl.innerHTML = '';
      printBeats(bannerBeats()).then(printMenu);
    } else if(val){
      addLine(`'${raw.trim()}' is not recognized. type a number 1-4.`, { amber: true });
    }
  }

  // ---------------------------------------------------------------
  // flow
  // ---------------------------------------------------------------

  async function runNamePromptFlow(withDarkIntroChance){
    if(withDarkIntroChance){
      const forced = sessionStorage.getItem('forceDarkIntro') === '1';
      if(forced) sessionStorage.removeItem('forceDarkIntro');
      const ran = await maybeRunDarkIntro(forced);
      if(ran) await sleep(120);
    }

    await printBeats(bannerBeats());
    await printBeat([{ text: 'state your name to continue:' }], 60);
    showNamePrompt();
  }

  async function begin(){
    await checkOwnerUnlock();
    await runNamePromptFlow(true);
  }

  function showNamePrompt(){
    setPromptUser('root');
    inputRow.style.display = 'flex';
    cmdField.value = '';
    cmdField.disabled = false;
    cmdField.focus();
    scrollDown();

    cmdField.onkeydown = (e) => {
      if(e.key === 'Enter'){
        const val = cmdField.value;
        cmdField.disabled = true;
        inputRow.style.display = 'none';
        addLine(promptText() + ' ' + val);
        handleNameSubmit(val);
      }
    };
  }

  async function handleNameSubmit(raw){
    const value = raw.trim();
    if(!value){ showNamePrompt(); return; }

    const result = await findSpecial(value);
    let special = result ? result.segments : null;

    if(result && result.hash === AVEN_HASH){
      // session cookie: cleared when the browser closes, not before
      document.cookie = 'swirl_session=' + AVEN_HASH.slice(0, 12) + '; path=/';
      if(!isOwnerVerified()){
        special = null; // only the verified device gets the special line
      }
    }

    if(special){
      await sleep(200);
      consoleEl.classList.add('glitch-hit');
      setTimeout(() => consoleEl.classList.remove('glitch-hit'), 320);
      printSegmentedLine(special);
      await sleep(400);
    } else {
      await sleep(120);
    }

    // hostname switches from root to the given name once it's known
    setPromptUser(value.toLowerCase());

    await printBeats(bootBeats(value));
    await printMenu();

    startIdleGlitchWatcher();

    // persistent shell prompt after boot
    inputRow.style.display = 'flex';
    cmdField.value = '';
    cmdField.disabled = false;
    cmdField.focus();
    scrollDown();

    cmdField.onkeydown = (e) => {
      if(e.key === 'Enter'){
        const val = cmdField.value;
        cmdField.value = '';
        addLine(promptText() + ' ' + val);
        runCommand(val);
        scrollDown();
      }
    };
  }

  begin();

})();
</script>

</body>
</html>
