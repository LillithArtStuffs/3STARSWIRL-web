<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Terminal Boot</title>
  <style>
    body {
      margin: 0;
      padding: 1rem;
      background: black;
      color: white;
      font-family: monospace;
      font-size: 1rem;
      white-space: pre-wrap;
    }
    #terminal {
      max-width: 800px;
      margin: 0 auto;
    }
    .input-line {
      display: inline;
    }
    .faint {
      color: rgba(255, 255, 255, 0.25);
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 1.25rem;
      animation: blink 1s infinite;
      cursor: pointer;
    }
    @keyframes blink {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="faint" onclick="window.location.href='terminal.html'">/</div>
  <div id="terminal"></div>

  <script>
    const terminal = document.getElementById('terminal');
    const messages = [
      "system: Initializing boot sequence...",
      "bios: Version 3.0.7 detected.",
      "chipset: OK",
      "cpu: AMD K7 QuadCore @ 3.6GHz - detected",
      "memory: 32768MB DDR5 RAM initialized",
      "drive0: 1TB SSD - OK",
      "drive1: 2TB HDD - OK",
      "usb: 4 devices connected",
      "net: Ethernet adapter detected",
      "net: MAC address: 44:1A:93:AC:4B:F3",
      "rtc: System clock synced",
      "secureboot: Disabled",
      "bootloader: GRUB 3.2.1",
      "initrd: loaded",
      "kernel: version 6.7.24-virtual-x64",
      "kernel: loading modules...",
      "module: fs/vfs loaded",
      "module: net/ethernet loaded",
      "module: drm/gpu loaded",
      "module: io/usbctrl loaded",
      "module: security/pam loaded",
      "init: systemd 252.1 starting...",
      "login: service enabled",
      "dbus: session bus ready",
      "udev: device manager ready",
      "cron: scheduled tasks loaded",
      "sound: audio chipset - OK",
      "graphics: TV/CRT emulation mode",
      "graphics: 1280x720 @ 60Hz - OK",
      "graphics: HDMI output detected",
      "graphics: DisplayPipe0 online",
      "input: Keyboard detected",
      "input: Mouse detected",
      "battery: AC connected",
      "boot-time: 14.65s",
      "loading: [ █▒▒▒▒▒▒▒▒▒▒ ] 10%",
      "loading: [ █████▒▒▒▒▒▒ ] 50%",
      "loading: [ █████████▒▒ ] 90%",
      "loading: [ ███████████ ] 100%",
      "finalizing: configs verified",
      "entropy: seed pool ready",
      "log: system logs mounted",
      "firewall: enabled",
      "vpn: not connected",
      "fetching: MOTD...",
      "motd: Welcome to 3STARSWIRL OS (dev mode)",
      "boot: ENV_VAR set",
      "boot: /dev/sda1 mounted",
      "checking: /tmp integrity",
      "checking: /var/log integrity",
      "checking: /home integrity",
      "status: all systems nominal",
      "error: boot@osproc failed to verify (ignored)",
      "warning: clock skew detected (ignored)",
      "finalizing: launch complete.",
      "--- SYSTEM READY ---"
    ];

    const delay = (ms) => new Promise(res => setTimeout(res, ms));

    async function bootSequence() {
      terminal.innerText = "last bootup failed.\nboot into terminal? [Y/N] ";
      document.addEventListener('keydown', async function handleKey(e) {
        if (e.key.toLowerCase() === 'y') {
          terminal.innerText += 'Y\n\n';
          document.removeEventListener('keydown', handleKey);
          for (const msg of messages) {
            terminal.innerText += msg + '\n';
            terminal.scrollTop = terminal.scrollHeight;
            await delay(Math.random() * 200 + 50); // Random delay between 50ms–250ms
          }
        } else if (e.key.toLowerCase() === 'n') {
          terminal.innerText += 'N\n\nexiting...';
          await delay(1000);
          window.location.href = 'join.html';
        }
      });
    }

    bootSequence();
  </script>
</body>
</html>
