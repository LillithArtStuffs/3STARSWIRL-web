<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Terminal Boot</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      color: #00ff00;
      font-family: monospace;
      overflow: hidden;
      height: 100%;
    }

    .terminal {
      padding: 10px;
      white-space: pre-wrap;
      overflow-y: auto;
      height: 100vh;
      box-sizing: border-box;
      text-shadow: 0 0 4px #00ff00;
    }

    .scanlines::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      background: repeating-linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0) 0px,
        rgba(0, 0, 0, 0) 2px,
        rgba(0, 0, 0, 0.15) 2px,
        rgba(0, 0, 0, 0.15) 4px
      );
      pointer-events: none;
    }

    .input-line {
      display: inline;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="scanlines"></div>
  <div class="terminal" id="terminal"></div>

  <script>
    const terminal = document.getElementById('terminal');

    const messages = [
      "Initializing system...",
      "Checking file system integrity...",
      "Loading kernel modules...",
      "Mounting /dev...",
      "Starting system services...",
      "Verifying hardware drivers...",
      "Launching daemons...",
      "Syncing system clock...",
      "Loading user preferences...",
      "Establishing secure connection...",
      "Decrypting volume...",
      "Starting display server...",
      "Initializing user interface...",
      "Loading environment variables...",
      "Calibrating input devices...",
      "Authenticating startup scripts...",
      "Establishing loopback interface...",
      "Mounting root filesystem...",
      "System entropy pool initialized.",
      "Attempting boot protocol...",
      "---",
      "ERROR: Module load failed: 'powerd.service'",
      "WARNING: NetworkManager service is slow to respond...",
      "Retrying connection to authentication server...",
      "ERROR: Time sync service unreachable.",
      "---",
      "Reinitializing drivers...",
      "Generating cryptographic keys...",
      "Cleaning temporary directories...",
      "Boot complete - performing final checks...",
      "Initiating startup hooks...",
      "Verifying update integrity...",
      "Boot audit logs generated.",
      "Monitoring services: ACTIVE",
      "Boot agent heartbeat received.",
      "Syncing core modules...",
      "Setting locale...",
      "Finalizing kernel environment...",
      "Verifying disk sectors...",
      "Reading GPT headers...",
      "Updating internal caches...",
      "Bootloader chain verified...",
      "Filesystem journal recovered successfully.",
      "Starting container service...",
      "Initializing runtime environment...",
      "Checking memory integrity...",
      "Performing thermal calibration...",
      "Starting user session...",
      "Boot hook response: SUCCESS",
      "Virtual console ready...",
      "Log services initialized.",
      "All systems nominal.",
    ];

    let index = 0;

    const boot = () => {
      if (index < messages.length) {
        const line = document.createElement('div');
        line.textContent = messages[index++];
        terminal.appendChild(line);
        terminal.scrollTop = terminal.scrollHeight;

        const delay = 80 + Math.random() * 120;
        setTimeout(boot, delay);
      } else {
        setTimeout(() => simulatePrompt(), 1000);
      }
    };

    const simulatePrompt = () => {
      const input = document.createElement('div');
      input.textContent = "\n> boot into terminal? [Y/N]";
      terminal.appendChild(input);
      terminal.scrollTop = terminal.scrollHeight;

      const keyListener = (e) => {
        if (e.key.toLowerCase() === 'y') {
          document.removeEventListener('keydown', keyListener);
          const response = document.createElement('div');
          response.textContent = "> Y";
          terminal.appendChild(response);
          terminal.scrollTop = terminal.scrollHeight;
          setTimeout(() => runTerminal(), 1000);
        } else if (e.key.toLowerCase() === 'n') {
          document.removeEventListener('keydown', keyListener);
          const response = document.createElement('div');
          response.textContent = "> N";
          terminal.appendChild(response);
          const exitMsg = document.createElement('div');
          exitMsg.textContent = "Exiting...";
          terminal.appendChild(exitMsg);
          terminal.scrollTop = terminal.scrollHeight;
          setTimeout(() => window.location.href = "join.html", 1500);
        }
      };

      document.addEventListener('keydown', keyListener);
    };

    const runTerminal = () => {
      const prompt = document.createElement('div');
      prompt.textContent = "\nuser@localhost:~$ ";
      terminal.appendChild(prompt);

      setTimeout(() => {
        const typing = document.createElement('span');
        typing.className = "input-line";
        terminal.appendChild(typing);

        let cmd = "clear";
        let i = 0;
        const typer = setInterval(() => {
          if (i < cmd.length) {
            typing.textContent += cmd[i++];
            terminal.scrollTop = terminal.scrollHeight;
          } else {
            clearInterval(typer);
            setTimeout(() => {
              window.location.href = 'os.html';
          }, 400);
        }, 100);
      }, 600);
    };

  
    boot();
  </script>
</body>
</html>
