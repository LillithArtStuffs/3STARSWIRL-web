<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Client Key Dashboard</title>
  <style>
    body {
      font-family: monospace;
      background: #111;
      color: #eee;
      padding: 2rem;
    }
    #login-status {
      font-weight: bold;
      margin-bottom: 1rem;
    }
    #generate {
      padding: 0.5rem 1rem;
      font-size: 1rem;
      margin-bottom: 1rem;
      cursor: pointer;
    }
    #generate:disabled {
      background: #444;
      cursor: not-allowed;
    }
    #key-container {
      margin-top: 1rem;
      padding: 1rem;
      background: #222;
      border: 1px solid #0f0;
      word-break: break-all;
    }
    #copy-btn {
      padding: 0.5rem 1rem;
      margin-top: 0.5rem;
      font-size: 1rem;
      cursor: pointer;
    }
    #copy-btn:disabled {
      background: #444;
      cursor: not-allowed;
    }
    .warning {
      color: #f55;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>

<h1>Client Key Dashboard</h1>

<div id="login-status">Checking login status...</div>

<button id="generate" disabled>Generate Client Key</button>

<div id="key-container" style="display:none;"></div>
<button id="copy-btn" disabled>Copy Key to Clipboard</button>
<div class="warning" id="warning-text"></div>

<script>
const loginStatus = document.getElementById("login-status");
const generateBtn = document.getElementById("generate");
const keyContainer = document.getElementById("key-container");
const copyBtn = document.getElementById("copy-btn");
const warningText = document.getElementById("warning-text");

// --- check if user is logged in ---
async function checkLogin() {
  try {
    const res = await fetch("/auth/me");
    const data = await res.json();

    if (data.loggedIn) {
      loginStatus.textContent = `Logged in as: ${data.username}`;
      generateBtn.disabled = false;
      loadKeyStatus();
    } else {
      loginStatus.textContent = "Not logged in";
      generateBtn.disabled = true;
    }
  } catch {
    loginStatus.textContent = "Error checking login";
    generateBtn.disabled = true;
  }
}

// --- load existing key ---
async function loadKeyStatus() {
  try {
    const res = await fetch("/keys/status");
    const data = await res.json();

    if (data.file) {
      // fetch the key content from server (return raw key instead of file)
      const keyRes = await fetch(`/keys/get-key?file=${encodeURIComponent(data.file)}`);
      const keyText = await keyRes.text();

      showKey(keyText, data.warning);
      generateBtn.disabled = true;
    }
  } catch {
    // no key yet
  }
}

// --- show key in box ---
function showKey(keyText, warning) {
  keyContainer.style.display = "block";
  keyContainer.textContent = keyText;
  copyBtn.disabled = false;
  warningText.textContent = "⚠️ Copy this key and save it in a text file. It will not be shown again!";
}

// --- generate new key ---
generateBtn.addEventListener("click", async () => {
  try {
    const res = await fetch("/keys/generate", { method: "POST" });
    const data = await res.json();

    if (!data.ok && data.msg) {
      warningText.textContent = data.msg;
      return;
    }

    // fetch the actual key string
    const keyRes = await fetch(`/keys/get-key?file=${encodeURIComponent(data.file)}`);
    const keyText = await keyRes.text();

    showKey(keyText, data.warning);
    generateBtn.disabled = true;
  } catch {
    warningText.textContent = "Error generating key!";
  }
});

// --- copy to clipboard ---
copyBtn.addEventListener("click", () => {
  navigator.clipboard.writeText(keyContainer.textContent)
    .then(() => alert("✅ Key copied! Paste it into a text file and save it somewhere safe."))
    .catch(() => alert("⚠️ Failed to copy key. Copy manually."));
});

// --- run on page load ---
checkLogin();
</script>

</body>
</html>
