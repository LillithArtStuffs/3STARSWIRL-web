<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Portal Dashboard</title>
  <style>
    body {
      background: #0f0f0f;
      color: #00ff00;
      font-family: monospace;
      padding: 2rem;
    }
    button {
      background: #000;
      color: #0f0;
      border: 1px solid #0f0;
      padding: 0.5rem 1rem;
      cursor: pointer;
      font-family: monospace;
      font-size: 1rem;
    }
    button:hover {
      background: #0f0;
      color: #000;
    }
    #key {
      margin-top: 1rem;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1>Portal Dashboard</h1>
  <p>Click below to generate your client key:</p>
  <button id="generate">Generate Client Key</button>
  <p id="key"></p>


<script>
document.getElementById("generate").addEventListener("click", async () => {
  const res = await fetch("/keys/generate", { method: "POST" });
  const data = await res.json();

  const keyParagraph = document.getElementById("key");
  keyParagraph.innerHTML = `
    Key file ready: <a href="${data.file}" download>Download Key</a><br>
    ${data.warning}
  `;
});
</script>

</body>
</html>
